name: Playwright E2E Tests CI/CD Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:  # Allow manual trigger

env:
  NODE_VERSION: '20.x'

jobs:
  # Job 1: Smoke Tests - Quick validation
  smoke-tests:
    name: 🚀 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']" | tr -d '^')" >> $GITHUB_OUTPUT

      - name: 💾 Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: 🎭 Install Playwright Browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🎭 Install System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: 🧪 Run Smoke Tests
        run: npx playwright test --grep @smoke --project=chromium

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: 📸 Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: screenshots/
          retention-days: 7

  # Job 2: Regression Tests - Full suite
  regression-tests:
    name: 🔄 Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke-tests  # Run only if smoke tests pass
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']" | tr -d '^')" >> $GITHUB_OUTPUT

      - name: 💾 Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: 🎭 Install Playwright Browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🎭 Install System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: 🧪 Run Regression Tests on ${{ matrix.browser }}
        run: npx playwright test --grep @regression --project=${{ matrix.browser }}

      - name: 📊 Upload Test Results - ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # Job 3: API Smoke Tests
  api-smoke-tests:
    name: 🔌 API Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: smoke-tests
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']" | tr -d '^')" >> $GITHUB_OUTPUT

      - name: 💾 Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: 🎭 Install Playwright Browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🎭 Install System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: 🧪 Run API Smoke Tests
        run: npx playwright test tests/API/petstore.spec.ts --grep @smoke --project=chromium

      - name: 📊 Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # Job 4: API Regression Tests
  api-regression-tests:
    name: 🔌 API Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: api-smoke-tests
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']" | tr -d '^')" >> $GITHUB_OUTPUT

      - name: 💾 Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: 🎭 Install Playwright Browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🎭 Install System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: 🧪 Run API Regression Tests on ${{ matrix.browser }}
        run: npx playwright test tests/API/ --grep @regression --project=${{ matrix.browser }}

      - name: 📊 Upload API Test Results - ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-results-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # Job 5: Mobile Tests
  mobile-tests:
    name: 📱 Mobile Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: smoke-tests
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']" | tr -d '^')" >> $GITHUB_OUTPUT

      - name: 💾 Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: 🎭 Install Playwright Browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🎭 Install System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: 📱 Run Mobile Tests (iPhone 14 Pro Max)
        run: npx playwright test --grep @mobile --project=chromium

      - name: 📊 Upload Mobile Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-results
          path: |
            playwright-report/
            test-results/
            screenshots/
          retention-days: 30

  # Job 6: Test Summary Report
  test-summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-tests, regression-tests, api-smoke-tests, api-regression-tests, mobile-tests]
    if: always()
    
    steps:
      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4

      - name: 📊 Create Test Summary
        run: |
          echo "## 🎯 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ UI Tests:" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke Tests: ${{ needs.smoke-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Regression Tests: ${{ needs.regression-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mobile Tests: ${{ needs.mobile-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔌 API Tests:" >> $GITHUB_STEP_SUMMARY
          echo "- API Smoke Tests: ${{ needs.api-smoke-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Regression Tests: ${{ needs.api-regression-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Framework Version: 2.0.0" >> $GITHUB_STEP_SUMMARY
          echo "### 🎭 Playwright E2E Test Framework" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**UI Tests:** Login, Dashboard, Transactions" >> $GITHUB_STEP_SUMMARY
          echo "**API Tests:** Pet Store API (10 test cases)" >> $GITHUB_STEP_SUMMARY
          echo "**Browsers Tested:** Chromium, Firefox, WebKit" >> $GITHUB_STEP_SUMMARY
          echo "**Mobile Device:** iPhone 14 Pro Max (430x932)" >> $GITHUB_STEP_SUMMARY
