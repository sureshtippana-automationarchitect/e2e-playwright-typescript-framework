name: Scheduled Nightly Tests

on:
  schedule:
    # Run every day at 2 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  NODE_VERSION: '20.x'

jobs:
  # Job 1: UI Tests - Full Suite
  ui-test-suite:
    name: 🕹️ Nightly UI Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix:
        suite: [UI/login, UI/dashboard, UI/transactions]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']" | tr -d '^')" >> $GITHUB_OUTPUT

      - name: 💾 Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: 🎭 Install Playwright Browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🎭 Install System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: 🧪 Run ${{ matrix.suite }} Tests on Chromium
        run: npx playwright test tests/${{ matrix.suite }}.spec.ts --project=chromium
        continue-on-error: true

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-ui-${{ matrix.suite }}-chromium
          path: |
            playwright-report/
            test-results/
            screenshots/
          retention-days: 14

  # Job 2: API Tests - Full Suite
  api-test-suite:
    name: 🔌 Nightly API Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']" | tr -d '^')" >> $GITHUB_OUTPUT

      - name: 💾 Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: 🎭 Install Playwright Browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🎭 Install System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: 🧪 Run API Tests on Chromium
        run: npx playwright test tests/API/ --project=chromium
        continue-on-error: true

      - name: 📊 Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-api-chromium
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # Job 3: Notification
  notification:
    name: 📧 Send Test Notification
    runs-on: ubuntu-latest
    needs: [ui-test-suite, api-test-suite]
    if: always()
    
    steps:
      - name: 📊 Create Nightly Summary
        run: |
          echo "## 🌙 Nightly Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Test Suite Status:" >> $GITHUB_STEP_SUMMARY
          echo "- UI Tests: ${{ needs.ui-test-suite.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Tests: ${{ needs.api-test-suite.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🕹️ UI Test Coverage:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Login Tests (3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dashboard Tests (3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Transaction Tests (3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔌 API Test Coverage:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Pet Store API Tests (3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 10 Test Cases (CRUD, Upload, Query, Security)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total UI Test Executions:** 36 (12 tests × 3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "**Total API Test Executions:** 30 (10 tests × 3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "**Grand Total:** 66 test executions" >> $GITHUB_STEP_SUMMARY
