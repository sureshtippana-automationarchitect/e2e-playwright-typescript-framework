name: Scheduled Nightly Tests

on:
  schedule:
    # Run every day at 2 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  NODE_VERSION: '20.x'

jobs:
  full-test-suite:
    name: 🌙 Nightly Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        suite: [login, dashboard, transactions]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🧪 Run ${{ matrix.suite }} Tests on ${{ matrix.browser }}
        run: npx playwright test tests/${{ matrix.suite }}.spec.ts --project=${{ matrix.browser }}
        continue-on-error: true

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.suite }}-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
            screenshots/
          retention-days: 14

  notification:
    name: 📧 Send Test Notification
    runs-on: ubuntu-latest
    needs: full-test-suite
    if: always()
    
    steps:
      - name: 📊 Create Nightly Summary
        run: |
          echo "## 🌙 Nightly Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.full-test-suite.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Suite Coverage:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Login Tests (3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dashboard Tests (3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Transaction Tests (3 browsers)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Test Executions:** 36 (12 tests × 3 browsers)" >> $GITHUB_STEP_SUMMARY
